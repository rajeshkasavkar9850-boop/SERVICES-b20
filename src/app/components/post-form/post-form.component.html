
<h3>Post Form</h3>
<div class="card mb-3">
    <div class="card-body">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text"#title class="form-control">
        </div>

        <div class="form-group">
            <label for="body">Content</label>
            <input type="text"#body class="form-control">
        </div>

         <div class="form-group">
            <label for="userId">User Id</label>
            <select type="text"#userId class="form-control">
                <option [value]="val" *ngFor="let val of userIdsArr">
                    {{val}}
                </option>
            </select>
        </div>
        <div>
          <button (click)="onPostAdd()"
          class="w-100 mt-2" mat-raised-button color="primary">Add Post</button>
        </div>
    </div>
</div>
