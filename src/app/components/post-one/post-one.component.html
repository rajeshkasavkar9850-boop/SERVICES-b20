

<h3>Posts One Comp</h3>
<ul class="list-group">
    <li *ngFor="let post of postsArr"
    class="list-group-item
    d-flex justify-content-between">
        <strong>
            {{post.title}}
        </strong>

        <div>
            <button class="me-2" mat-raised-button color="primary">Edit</button>
            <button (click)="onRemove(post.id)"
            mat-raised-button color="warn">Remove</button>
        </div>
    </li>
</ul>
