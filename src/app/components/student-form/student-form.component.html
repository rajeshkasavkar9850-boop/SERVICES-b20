

<div class="card">
    <div class="card-body">
        <form #stdForm="ngForm" (ngSubmit)="onStudentSubmit()">
            <div class="form-group">
                <label for="fname">First Name*</label>
                <input 
                required
                ngModel
                name="fname"
                type="text" class="form-control">
            </div>

             <div class="form-group">
                <label for="lname">Last Name*</label>
                <input 
                required
                ngModel
                name="lname"
                type="text" class="form-control">
            </div>

             <div class="form-group">
                <label for="email">Email*</label>
                <input 
                required
                ngModel
                name="email"
                type="text" class="form-control">
            </div>

             <div class="form-group">
                <label for="contact">Contact*</label>
                <input 
                required
                ngModel
                name="contact"
                type="text" class="form-control">
            </div>

             <div class="form-group">
                <label for="isActive">Is Active</label>
                <select 
                required
                ngModel
                name="isActive"
                type="text" class="form-control">
                <option [ngValue]="true">Yes</option>
                <option [ngValue]="false">No</option>
                </select>
            </div>

            
             <button 
             *ngIf="!isEditModule"
             [disabled]="stdForm.invalid"
             class="w-100 mt-2" mat-raised-button color="primary" type="submit">Add Std</button>
            
            
            <button *ngIf="isEditModule"
            [disabled]="stdForm.invalid"
            class="w-100" mat-raised-button color="primary" type="button">Update Std</button>
            

        </form>
    </div>
</div>
